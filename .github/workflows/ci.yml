name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bash:
    name: bash syntax + shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: bash -n on every shell script
        run: |
          set -e
          shopt -s nullglob
          for f in scripts/*.sh tests/*.sh; do
            echo "checking: $f"
            bash -n "$f"
          done

      - name: install shellcheck
        run: sudo apt-get update -y && sudo apt-get install -y shellcheck

      - name: shellcheck
        run: |
          # SC2155 (declare and assign separately) — common-enough idiom in our scripts
          # SC1090 (can't follow non-constant source) — n/a, we don't source
          shellcheck \
            --severity=warning \
            --exclude=SC2155 \
            scripts/*.sh tests/*.sh

  python:
    name: python compile + unit tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.9', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: py_compile every Python file
        run: |
          set -e
          for f in scripts/*.py tests/*.py; do
            echo "compiling: $f"
            python3 -m py_compile "$f"
          done

      - name: unit tests
        run: python3 -m unittest discover -s tests -v

  quarantine-roundtrip:
    name: quarantine roundtrip
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: quarantine + restore
        run: bash tests/test_quarantine_roundtrip.sh

  template-smoke:
    name: HTML template smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}

      - name: inject sample data into both templates and assert no breakout
        # The template smoke test reuses the unit tests in tests/, which
        # already exercise both templates with adversarial payloads
        # (</script>, U+2028, U+2029) and assert no breakout in the rendered
        # <script> bodies. Running them here in a Python-only matrix entry
        # gives a fast signal even if the full unit-test job is slow.
        run: python3 -m unittest tests.test_inject_audit_data -v
