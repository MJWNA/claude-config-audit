name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bash:
    name: bash syntax + shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: bash -n on every shell script
        run: |
          set -e
          shopt -s nullglob
          for f in scripts/*.sh tests/*.sh; do
            echo "checking: $f"
            bash -n "$f"
          done

      - name: install shellcheck
        run: sudo apt-get update -y && sudo apt-get install -y shellcheck

      - name: shellcheck
        run: |
          # SC2155 (declare and assign separately) — common-enough idiom in our scripts
          # SC1090 (can't follow non-constant source) — n/a, we don't source
          shellcheck \
            --severity=warning \
            --exclude=SC2155 \
            scripts/*.sh tests/*.sh

  python:
    name: python compile + unit tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.9', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: py_compile every Python file
        run: |
          set -e
          for f in scripts/*.py tests/*.py; do
            echo "compiling: $f"
            python3 -m py_compile "$f"
          done

      - name: unit tests
        run: python3 -m unittest discover -s tests -v

  quarantine-roundtrip:
    name: quarantine roundtrip
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: quarantine + restore
        run: bash tests/test_quarantine_roundtrip.sh

  integration-smoke:
    # End-to-end: synthetic ~/.claude/ → discovery → counts → inject → quarantine → restore.
    # Catches gaps between modules that the per-module unit tests can't see —
    # e.g. discovery output the analyzer can't parse, template injection
    # producing valid HTML but corrupt data, restore summary that doesn't
    # reflect actual restored count.
    name: integration smoke test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - name: end-to-end pipeline
        run: bash tests/test_integration.sh

  plugin-layout:
    # Plugin discovery requires skills/<name>/SKILL.md. We mirror the root
    # SKILL.md into skills/claude-config-audit/ via symlinks. If a clone
    # ever loses the symlinks (e.g. someone copies files instead of cloning,
    # or a Windows checkout breaks them), plugin install would silently
    # find no skill — only the slash commands would work. This job is the
    # canary for that.
    name: plugin layout (symlinks resolve)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: SKILL.md and resources resolve in plugin layout
        run: |
          set -e
          test -f skills/claude-config-audit/SKILL.md
          test -d skills/claude-config-audit/references
          test -d skills/claude-config-audit/scripts
          test -d skills/claude-config-audit/assets
          # The symlinked SKILL.md must contain real content, not a broken link.
          grep -q "^# Claude Config Audit" skills/claude-config-audit/SKILL.md
          # Plugin manifest must exist at the canonical location.
          test -f .claude-plugin/plugin.json
          echo "plugin layout OK"

  template-smoke:
    name: HTML template smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}

      - name: inject sample data into both templates and assert no breakout
        # The template smoke test reuses the unit tests in tests/, which
        # already exercise both templates with adversarial payloads
        # (</script>, U+2028, U+2029) and assert no breakout in the rendered
        # <script> bodies. Running them here in a Python-only matrix entry
        # gives a fast signal even if the full unit-test job is slow.
        run: python3 -m unittest tests.test_inject_audit_data -v
