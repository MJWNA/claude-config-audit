name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bash:
    name: bash syntax + shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: bash -n on every shell script
        run: |
          set -e
          shopt -s nullglob
          for f in scripts/*.sh tests/*.sh; do
            echo "checking: $f"
            bash -n "$f"
          done

      - name: install shellcheck
        run: sudo apt-get update -y && sudo apt-get install -y shellcheck

      - name: shellcheck
        run: |
          # SC2155 (declare and assign separately) — common-enough idiom in our scripts
          # SC1090 (can't follow non-constant source) — n/a, we don't source
          shellcheck \
            --severity=warning \
            --exclude=SC2155 \
            scripts/*.sh tests/*.sh

  python:
    name: python compile + unit tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        # Python 3.9 reached end-of-life on 2025-10-31. Dropped from the
        # matrix to focus runner budget on supported versions.
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: py_compile every Python file
        run: |
          set -e
          for f in scripts/*.py tests/*.py; do
            echo "compiling: $f"
            python3 -m py_compile "$f"
          done

      - name: unit tests
        run: python3 -m unittest discover -s tests -v

  quarantine-roundtrip:
    name: quarantine roundtrip
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: quarantine + restore
        run: bash tests/test_quarantine_roundtrip.sh

  shell-smoke-tests:
    # Bash-only tests for verify-prerequisites and recursive discovery.
    # Quick to run, catch script-level regressions per-OS.
    name: shell smoke tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: verify-prerequisites smoke test
        run: bash tests/test_verify_prerequisites.sh
      - name: discover-config recursive rules
        run: bash tests/test_discover_recursive.sh

  integration-smoke:
    # End-to-end: synthetic ~/.claude/ → discovery → counts → inject → quarantine → restore.
    # Catches gaps between modules that the per-module unit tests can't see —
    # e.g. discovery output the analyzer can't parse, template injection
    # producing valid HTML but corrupt data, restore summary that doesn't
    # reflect actual restored count.
    name: integration smoke test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - name: end-to-end pipeline
        run: bash tests/test_integration.sh

  plugin-layout:
    # Plugin discovery requires skills/<name>/SKILL.md. We mirror the root
    # SKILL.md into skills/claude-config-audit/ via symlinks. If a clone
    # ever loses the symlinks (e.g. someone copies files instead of cloning,
    # or a Windows checkout without core.symlinks=true), plugin install
    # would silently find no skill — only the slash commands would work.
    # This job is the canary for that.
    #
    # Windows runner included specifically because that's where this fails
    # in practice: native Windows clones without developer mode + git
    # core.symlinks=true store symlinks as text files containing the path.
    # `test -f` would still pass (it's a regular file!), so the test asserts
    # real content, not just presence.
    name: plugin layout (symlinks resolve)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          # Without this, Windows checkouts can store symlinks as plain
          # text files containing the target path. The whole point of this
          # job is to catch that, so we explicitly enable symlink support.
          # If a real user clone fails because they don't have developer
          # mode, our README + .gitattributes guidance handles it.
          submodules: false
      - name: ensure git symlink support
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git config --global core.symlinks true
          # Re-checkout to materialise symlinks now that the config is set.
          git checkout-index --all --force

      - name: SKILL.md and resources resolve in plugin layout
        shell: bash
        run: |
          set -e
          # `test -f` on Windows would pass for a 12-byte text file
          # containing the symlink target. Assert the file has real content
          # AND the expected first heading, which only the canonical SKILL.md
          # contains.
          test -f skills/claude-config-audit/SKILL.md
          test -d skills/claude-config-audit/references
          test -d skills/claude-config-audit/scripts
          test -d skills/claude-config-audit/assets
          size=$(wc -c < skills/claude-config-audit/SKILL.md | tr -d ' ')
          if [ "$size" -lt 1000 ]; then
            echo "ERROR: SKILL.md is suspiciously small ($size bytes) — is the symlink resolving?"
            cat skills/claude-config-audit/SKILL.md
            exit 1
          fi
          grep -q "^# Claude Config Audit" skills/claude-config-audit/SKILL.md
          # Plugin manifest must exist at the canonical location.
          test -f .claude-plugin/plugin.json
          # Marketplace manifest required for `/plugin marketplace add` to
          # work — verified in v2.3 after the v2.2 README claimed an install
          # path that wasn't actually wired up.
          test -f .claude-plugin/marketplace.json
          echo "plugin layout OK on $(uname -s 2>/dev/null || echo windows)"

  template-smoke:
    name: HTML template smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}

      - name: inject sample data into both templates and assert no breakout
        # The template smoke test reuses the unit tests in tests/, which
        # already exercise both templates with adversarial payloads
        # (</script>, U+2028, U+2029) and assert no breakout in the rendered
        # <script> bodies. Running them here in a Python-only matrix entry
        # gives a fast signal even if the full unit-test job is slow.
        run: python3 -m unittest tests.test_inject_audit_data -v
